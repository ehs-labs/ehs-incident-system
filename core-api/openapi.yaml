---
openapi: 3.1.0
info:
  title: EHS Incident System API
  version: 1.0.0
  description: |-
    REST API for the EHS Incident Management System (core-api).
    All endpoints under /api/v1 require a Bearer JWT in the Authorization
    header except the /auth/* endpoints. Errors follow RFC 7807
    problem+json.

    Generated via `bundle exec rake rswag:specs:swaggerize`. Do not edit
    by hand — edit the request specs instead.
servers:
- url: http://localhost:3000
  description: Local dev (docker-compose)
- url: https://api.ehs.example.com
  description: Production placeholder
security:
- bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Problem:
      type: object
      description: RFC 7807 problem+json error envelope
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
    UserAttributes:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum:
          - worker
          - investigator
          - admin
        organization_id:
          type: integer
        confirmed_at:
          type: string
          format: date-time
          nullable: true
        locked_at:
          type: string
          format: date-time
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
    IncidentAttributes:
      type: object
      properties:
        state:
          type: string
          enum:
          - draft
          - submitted
          - investigating
          - pending_closure
          - closed
        incident_type:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 5
        occurred_at:
          type: string
          format: date-time
        location:
          type: string
        summary:
          type: string
        description:
          type: string
        root_cause:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        triaged_at:
          type: string
          format: date-time
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
        site_id:
          type: integer
        reporter_id:
          type: integer
        assignee_id:
          type: integer
          nullable: true
    CorrectiveActionAttributes:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        state:
          type: string
          enum:
          - open
          - in_progress
          - done
          - verified
          - cancelled
        due_date:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
        overdue:
          type: boolean
        assignee_id:
          type: integer
        incident_id:
          type: integer
    DashboardAttributes:
      type: object
      properties:
        open_incidents_by_severity:
          type: object
          additionalProperties:
            type: integer
        incidents_by_state:
          type: object
          additionalProperties:
            type: integer
        overdue_corrective_actions_count:
          type: integer
        last_30_day_incidents_trend:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              count:
                type: integer
        avg_time_to_close_seconds:
          type: number
          nullable: true
        sla_compliance:
          type: object
          additionalProperties:
            type: string
paths:
  "/api/v1/admin/settings":
    get:
      summary: Return organization SLA settings
      tags:
      - admin/settings
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK — returns empty overrides initially
        '403':
          description: Forbidden — worker cannot access settings
    patch:
      summary: Update organization SLA overrides
      tags:
      - admin/settings
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: OK — updated overrides flow into Incident#triage_sla
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                setting:
                  type: object
                  properties:
                    sla_overrides:
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          triage_seconds:
                            type: integer
        required: true
  "/api/v1/admin/sites":
    get:
      summary: List all sites in the organization
      tags:
      - admin/sites
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK — admin lists sites
        '403':
          description: Forbidden — worker cannot list sites
    post:
      summary: Create a new site
      tags:
      - admin/sites
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: Created — valid site
        '422':
          description: Unprocessable — invalid timezone
        '403':
          description: Forbidden — worker cannot create a site
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                site:
                  type: object
                  required:
                  - name
                  - timezone
                  properties:
                    name:
                      type: string
                    timezone:
                      type: string
        required: true
  "/api/v1/admin/sites/{id}":
    parameters:
    - name: id
      in: path
      schema:
        type: integer
      required: true
    patch:
      summary: Update a site
      tags:
      - admin/sites
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: OK — name updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                site:
                  type: object
                  properties:
                    name:
                      type: string
                    timezone:
                      type: string
        required: true
    delete:
      summary: Destroy a site
      tags:
      - admin/sites
      security:
      - bearerAuth: []
      responses:
        '204':
          description: No Content — site deleted
  "/api/v1/admin/users":
    get:
      summary: List users in the organization
      tags:
      - admin/users
      security:
      - bearerAuth: []
      parameters:
      - name: role
        in: query
        schema:
          type: string
        required: false
      - name: q
        in: query
        schema:
          type: string
        required: false
      responses:
        '200':
          description: OK — filtered by q (email/name)
        '403':
          description: Forbidden — worker cannot list users
  "/api/v1/admin/users/invite":
    post:
      summary: Invite a new user via email
      tags:
      - admin/users
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: Created — invitation email sent and sites assigned
        '403':
          description: Forbidden — investigator cannot invite users
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  required:
                  - email
                  - name
                  - role
                  properties:
                    email:
                      type: string
                      format: email
                    name:
                      type: string
                    role:
                      type: string
                      enum:
                      - worker
                      - investigator
                      - admin
                    site_ids:
                      type: array
                      items:
                        type: integer
        required: true
  "/api/v1/admin/users/{id}/lock":
    parameters:
    - name: id
      in: path
      schema:
        type: integer
      required: true
    post:
      summary: Lock a user account
      tags:
      - admin/users
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK — user is locked
        '403':
          description: Forbidden — worker cannot lock accounts
  "/api/v1/admin/users/{id}/unlock":
    parameters:
    - name: id
      in: path
      schema:
        type: integer
      required: true
    post:
      summary: Unlock a user account
      tags:
      - admin/users
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK — user is unlocked
  "/api/v1/admin/users/{id}":
    parameters:
    - name: id
      in: path
      schema:
        type: integer
      required: true
    delete:
      summary: Soft-delete a user
      tags:
      - admin/users
      security:
      - bearerAuth: []
      responses:
        '204':
          description: No Content — user soft-deleted
  "/api/v1/assignable_users":
    get:
      summary: List users assignable to incidents and corrective actions
      tags:
      - assignable_users
      security:
      - bearerAuth: []
      parameters:
      - name: q
        in: query
        schema:
          type: string
        required: false
      responses:
        '200':
          description: OK — payload exposes only id, name, email, role
        '403':
          description: Forbidden — worker cannot list assignable users
        '401':
          description: Unauthorized — missing JWT
  "/api/v1/incidents/{incident_id}/attachments":
    parameters:
    - name: incident_id
      in: path
      schema:
        type: integer
      required: true
    post:
      summary: Upload a file attachment to an incident
      tags:
      - attachments
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: Created — file attached to incident
        '422':
          description: Unprocessable — no file provided
        '404':
          description: Not Found — user from another org cannot see the incident
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: string
              format: binary
        required: true
    get:
      summary: List attachments on an incident
      tags:
      - attachments
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK — lists attachments with proxy URLs
  "/api/v1/attachments/{id}":
    parameters:
    - name: id
      in: path
      schema:
        type: integer
      required: true
    delete:
      summary: Purge an attachment
      tags:
      - attachments
      security:
      - bearerAuth: []
      responses:
        '204':
          description: No Content — attachment purged
        '404':
          description: Not Found — user from another org cannot see the attachment
  "/api/v1/auth/signup":
    post:
      summary: Create a new tenant + admin user
      tags:
      - auth
      security: []
      parameters: []
      responses:
        '201':
          description: Created — JWT in Authorization header
        '422':
          description: Validation failed (e.g. duplicate email)
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  required:
                  - email
                  - password
                  - name
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                    name:
                      type: string
                    organization_name:
                      type: string
              required:
              - user
        required: true
  "/api/v1/auth/login":
    post:
      summary: Exchange credentials for a JWT
      tags:
      - auth
      security: []
      parameters: []
      responses:
        '200':
          description: OK — JWT in Authorization header
        '401':
          description: Invalid credentials
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  required:
                  - email
                  - password
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
              required:
              - user
        required: true
  "/api/v1/auth/logout":
    delete:
      summary: Revoke the current JWT
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '204':
          description: No Content
  "/api/v1/incidents/{incident_id}/comments":
    parameters:
    - name: incident_id
      in: path
      schema:
        type: integer
      required: true
    get:
      summary: List comments on an incident
      tags:
      - comments
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Add a comment to an incident
      tags:
      - comments
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: Created — author is set from current user, not params
        '404':
          description: Not Found — unrelated worker cannot see the incident
        '422':
          description: Unprocessable — empty body
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: object
                  required:
                  - body
                  properties:
                    body:
                      type: string
        required: true
  "/api/v1/comments/{id}":
    parameters:
    - name: id
      in: path
      schema:
        type: integer
      required: true
    patch:
      summary: Update a comment
      tags:
      - comments
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: OK — admin can edit any comment
        '404':
          description: Not Found — unrelated worker cannot see the comment
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: object
                  properties:
                    body:
                      type: string
        required: true
    delete:
      summary: Delete a comment
      tags:
      - comments
      security:
      - bearerAuth: []
      responses:
        '204':
          description: No Content — author deletes their own comment
  "/api/v1/corrective_actions/{corrective_action_id}/events":
    parameters:
    - name: corrective_action_id
      in: path
      schema:
        type: integer
      required: true
    get:
      summary: List events for a corrective action
      tags:
      - corrective_actions
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK — chronological list, oldest first
        '404':
          description: Not Found — action does not exist
  "/api/v1/incidents/{incident_id}/corrective_actions":
    parameters:
    - name: incident_id
      in: path
      schema:
        type: integer
      required: true
    get:
      summary: List corrective actions for an incident
      tags:
      - corrective_actions
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK — actions scoped by Pundit policy
        '401':
          description: Unauthorized — no token
    post:
      summary: Create a corrective action for an incident
      tags:
      - corrective_actions
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: Created — note is recorded as the :assigned audit event
        '403':
          description: Forbidden — workers cannot create corrective actions
        '422':
          description: Validation error (blank title or past due_date)
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - corrective_action
              properties:
                corrective_action:
                  type: object
                  required:
                  - title
                  - description
                  - due_date
                  - assignee_id
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    due_date:
                      type: string
                      format: date-time
                    assignee_id:
                      type: integer
                    note:
                      type: string
        required: true
  "/api/v1/corrective_actions/{id}":
    parameters:
    - name: id
      in: path
      schema:
        type: integer
      required: true
    get:
      summary: Get a single corrective action
      tags:
      - corrective_actions
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
        '404':
          description: Not Found — action belongs to another org
  "/api/v1/corrective_actions/{id}/transitions":
    parameters:
    - name: id
      in: path
      schema:
        type: integer
      required: true
    post:
      summary: Run an AASM transition on a corrective action
      tags:
      - corrective_actions
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: Transition records the optional note on the event row
        '422':
          description: Invalid or unknown event
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - event
              properties:
                event:
                  type: string
                  enum:
                  - start
                  - complete
                  - verify
                  - cancel
                note:
                  type: string
        required: true
  "/api/v1/dashboard":
    get:
      summary: Summary stats for current user
      tags:
      - dashboard
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK — investigator sees incidents on their sites only
        '401':
          description: Unauthorized — no token
  "/api/v1/incidents/{incident_id}/versions":
    parameters:
    - name: incident_id
      in: path
      schema:
        type: integer
      required: true
    get:
      summary: Audit trail for an incident
      tags:
      - incident_versions
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK — whodunnit_user is resolved per-version across different
            users
        '404':
          description: Not Found — Pundit scope hides incident from unrelated worker
        '401':
          description: Unauthorized — no token
  "/api/v1/incidents":
    get:
      summary: List incidents (paginated, Pundit-scoped)
      tags:
      - incidents
      security:
      - bearerAuth: []
      parameters:
      - name: state
        in: query
        schema:
          type: string
        required: false
      - name: severity
        in: query
        schema:
          type: integer
        required: false
      - name: site_id
        in: query
        schema:
          type: integer
        required: false
      - name: q
        in: query
        schema:
          type: string
        required: false
      - name: page
        in: query
        schema:
          type: integer
        required: false
      - name: per_page
        in: query
        schema:
          type: integer
        required: false
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized — no or invalid token
    post:
      summary: Create a new (draft) incident
      tags:
      - incidents
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: Created
        '422':
          description: Validation error
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - incident
              properties:
                incident:
                  type: object
                  required:
                  - site_id
                  - incident_type
                  - severity
                  - occurred_at
                  - location
                  - summary
                  - description
                  properties:
                    site_id:
                      type: integer
                    incident_type:
                      type: string
                    severity:
                      type: integer
                      minimum: 1
                      maximum: 5
                    occurred_at:
                      type: string
                      format: date-time
                    location:
                      type: string
                    summary:
                      type: string
                    description:
                      type: string
        required: true
  "/api/v1/incidents/{id}":
    parameters:
    - name: id
      in: path
      schema:
        type: integer
      required: true
    get:
      summary: Get an incident
      tags:
      - incidents
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
        '404':
          description: Not Found — incident not in caller's Pundit scope
    patch:
      summary: Update an incident
      tags:
      - incidents
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: OK
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                incident:
                  type: object
                  properties:
                    summary:
                      type: string
                    description:
                      type: string
                    severity:
                      type: integer
                      minimum: 1
                      maximum: 5
        required: true
  "/api/v1/incidents/{id}/transitions":
    parameters:
    - name: id
      in: path
      schema:
        type: integer
      required: true
    post:
      summary: Run an AASM state transition
      tags:
      - incidents
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: Admin who reported the incident can submit it
        '422':
          description: Invalid transition or unknown event
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
        '403':
          description: Forbidden — caller authorized to see the incident but not perform
            this transition
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - event
              properties:
                event:
                  type: string
                  enum:
                  - submit
                  - triage
                  - verify
                  - close
                  - reopen
                assignee_id:
                  type: integer
                severity:
                  type: integer
        required: true
  "/api/v1/me":
    get:
      summary: Return the current user's profile
      tags:
      - me
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized — no token
    patch:
      summary: Update the current user's name
      tags:
      - me
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: OK — only name is updated; email and role are ignored
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                me:
                  type: object
                  properties:
                    name:
                      type: string
        required: true
  "/api/v1/incidents/{incident_id}/witnesses":
    parameters:
    - name: incident_id
      in: path
      schema:
        type: integer
      required: true
    get:
      summary: List witnesses for an incident
      tags:
      - witnesses
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK — lists witnesses for a visible incident
        '404':
          description: Not Found — user from another org cannot see the incident
    post:
      summary: Add a witness to an incident
      tags:
      - witnesses
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: Created — reporter adds a witness to their draft
        '404':
          description: Not Found — non-reporter worker cannot see the incident
        '422':
          description: Unprocessable — name is required
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                witness:
                  type: object
                  required:
                  - name
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                      format: email
                    phone:
                      type: string
                    statement:
                      type: string
        required: true
  "/api/v1/witnesses/{id}":
    parameters:
    - name: id
      in: path
      schema:
        type: integer
      required: true
    patch:
      summary: Update a witness
      tags:
      - witnesses
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: OK — admin updates the witness
        '403':
          description: Forbidden — worker cannot edit a witness
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                witness:
                  type: object
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                      format: email
                    phone:
                      type: string
                    statement:
                      type: string
        required: true
    delete:
      summary: Delete a witness
      tags:
      - witnesses
      security:
      - bearerAuth: []
      responses:
        '204':
          description: No Content — investigator deletes the witness
        '403':
          description: Forbidden — reporter cannot delete a witness
