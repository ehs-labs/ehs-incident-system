name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint — every language at once. Cheap. Fails fast.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          working-directory: core-api
          bundler-cache: true

      - name: RuboCop (core-api)
        working-directory: core-api
        run: bundle exec rubocop --parallel --no-color

      # setup-ruby's bundler-cache only covers core-api's working-directory;
      # cache notifier's gems separately keyed on its Gemfile.lock.
      - name: Cache notifier bundle
        uses: actions/cache@v5
        with:
          path: notifier/vendor/bundle
          key: bundle-notifier-${{ runner.os }}-ruby-4.0.5-${{ hashFiles('notifier/Gemfile.lock') }}
          restore-keys: |
            bundle-notifier-${{ runner.os }}-ruby-4.0.5-

      - name: RuboCop (notifier)
        working-directory: notifier
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4 --retry 3
          bundle exec rubocop --parallel --no-color

      - uses: pnpm/action-setup@v6
        with:
          version: "9"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Frontend lint
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run lint
          pnpm run typecheck

  # ---------------------------------------------------------------------------
  # Security — Brakeman (Rails SAST), bundler-audit (Ruby), npm audit (frontend)
  # ---------------------------------------------------------------------------
  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          working-directory: core-api
          bundler-cache: true

      - name: Brakeman
        working-directory: core-api
        run: bundle exec brakeman --no-pager --quiet --exit-on-warn --ignore-config config/brakeman.ignore

      - name: bundler-audit (core-api)
        working-directory: core-api
        run: bundle exec bundle-audit check --update

      - name: Cache notifier bundle
        uses: actions/cache@v5
        with:
          path: notifier/vendor/bundle
          key: bundle-notifier-${{ runner.os }}-ruby-4.0.5-${{ hashFiles('notifier/Gemfile.lock') }}
          restore-keys: |
            bundle-notifier-${{ runner.os }}-ruby-4.0.5-

      - name: bundler-audit (notifier)
        working-directory: notifier
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4 --retry 3
          bundle exec bundle-audit check --update

      - uses: pnpm/action-setup@v6
        with:
          version: "9"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: pnpm audit
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level high

  # ---------------------------------------------------------------------------
  # Core-API test suite — RSpec with real Postgres + Redis
  # Emits openapi.yaml via rswag for the contract job
  # ---------------------------------------------------------------------------
  test-core-api:
    name: Test core-api
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ehs
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: ehs_app_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://ehs:testpassword@localhost:5432/ehs_app_test
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET: ci-jwt-secret-replace-me
      JWT_DENYLIST_SECRET: ci-jwt-denylist-secret-replace-me
      FIELD_CIPHER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          working-directory: core-api
          bundler-cache: true

      - name: DB setup
        working-directory: core-api
        run: |
          bundle exec rails db:create
          bundle exec rails db:migrate

      - name: RSpec
        working-directory: core-api
        run: bundle exec rspec

      - name: Regenerate openapi.yaml
        working-directory: core-api
        run: bundle exec rake rswag:specs:swaggerize

      - name: Assert openapi.yaml matches committed file
        working-directory: core-api
        run: git diff --exit-code openapi.yaml

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v7
        with:
          name: openapi
          path: core-api/openapi.yaml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Notifier test suite — RSpec with Postgres + Kafka + Karapace
  # ---------------------------------------------------------------------------
  test-notifier:
    name: Test notifier
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ehs
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: ehs_notifier_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
    env:
      DATABASE_URL: postgres://ehs:testpassword@localhost:5432/ehs_notifier_test
      KAFKA_BROKERS: localhost:9092
      KARAPACE_URL: http://localhost:8081
      FIELD_CIPHER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      JWT_SECRET: ci-jwt-secret-replace-me
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          working-directory: notifier
          bundler-cache: true

      - name: RSpec (karafka-testing covers Kafka in unit specs)
        working-directory: notifier
        run: |
          bundle exec rake db:create db:migrate
          bundle exec rspec

  # ---------------------------------------------------------------------------
  # Frontend tests — Vitest + type-check
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: "9"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Vitest
        working-directory: frontend
        run: pnpm run test:unit

      - name: Type-check
        working-directory: frontend
        run: pnpm run typecheck

  # ---------------------------------------------------------------------------
  # Contract validation — OpenAPI committed matches generated; Avro schemas
  # register against a scratch Karapace and pass BACKWARD compatibility.
  # ---------------------------------------------------------------------------
  contracts:
    name: Contract validation
    runs-on: ubuntu-latest
    needs: [test-core-api]
    steps:
      - uses: actions/checkout@v6

      - name: Download OpenAPI artifact
        uses: actions/download-artifact@v8
        with:
          name: openapi
          path: core-api

      - name: Copy env template
        run: cp .env.example .env

      - name: Start Kafka + Karapace
        run: docker compose up -d --wait kafka karapace
        timeout-minutes: 5

      - name: Validate Avro schemas
        run: |
          for schema in schemas/events/v1/*.avsc; do
            echo "Registering $schema"
            subject=$(basename "$schema" .avsc)-value
            payload=$(jq -Rs '{schema: ., schemaType: "AVRO"}' < "$schema")
            response=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Content-Type: application/vnd.schemaregistry.v1+json" \
              -d "$payload" \
              "http://localhost:8081/subjects/$subject/versions")
            code=$(printf '%s' "$response" | tail -n1)
            body=$(printf '%s' "$response" | sed '$d')
            if [ "$code" -ge 400 ]; then
              echo "::error::Schema $schema failed (HTTP $code): $body"
              exit 1
            fi
            echo "  -> HTTP $code $body"
          done

      - name: Capture karapace logs on failure
        if: failure()
        run: docker compose logs kafka karapace

  # ---------------------------------------------------------------------------
  # Build images & push to GHCR — only on main branch
  # ---------------------------------------------------------------------------
  build-images:
    name: Build & push images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, security, test-core-api, test-notifier, test-frontend, contracts]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [core-api, notifier, frontend]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service }}
          # core-api and notifier reference the shared local-path gem and the
          # Avro schemas via named build contexts (see their Dockerfiles'
          # COPY --from=shared-envelope / --from=schemas). Same set as
          # docker-compose.yml's additional_contexts. Harmless for frontend.
          build-contexts: |
            shared-envelope=shared/envelope
            schemas=schemas/events/v1
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ehs-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/ehs-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ---------------------------------------------------------------------------
  # End-to-end via Playwright against full docker-compose stack
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [test-core-api, test-notifier, test-frontend]
    steps:
      - uses: actions/checkout@v6

      - name: Copy env template
        run: cp .env.example .env

      # Pre-build the three app images via buildx with GHA layer cache. The
      # built images are loaded into the local Docker daemon and reused by
      # `docker compose up` below (compose only builds if the tagged image is
      # missing). Cache scopes match build-images for core-api/notifier so the
      # caches are shared; frontend uses target: dev here, separate scope.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build core-api image (cached)
        uses: docker/build-push-action@v7
        with:
          context: core-api
          build-contexts: |
            shared-envelope=shared/envelope
            schemas=schemas/events/v1
          tags: ehs-incident-system-core-api:latest
          load: true
          cache-from: type=gha,scope=core-api
          cache-to: type=gha,scope=core-api,mode=max

      - name: Build notifier image (cached)
        uses: docker/build-push-action@v7
        with:
          context: notifier
          build-contexts: |
            shared-envelope=shared/envelope
            schemas=schemas/events/v1
          tags: ehs-incident-system-notifier:latest
          load: true
          cache-from: type=gha,scope=notifier
          cache-to: type=gha,scope=notifier,mode=max

      - name: Build frontend image (cached)
        uses: docker/build-push-action@v7
        with:
          context: frontend
          target: dev
          tags: ehs-incident-system-frontend:latest
          load: true
          cache-from: type=gha,scope=frontend-dev
          cache-to: type=gha,scope=frontend-dev,mode=max

      - name: Bring up infrastructure
        # All of core-api/notifier's infra deps: postgres, redis (for Sidekiq
        # queueing during seed), kafka, karapace, minio, mailcatcher.
        run: docker compose up -d --wait postgres redis kafka karapace minio mailcatcher
        timeout-minutes: 5

      - name: Initialize MinIO bucket
        run: docker compose up minio-init

      - name: Create Kafka topics
        # AUTO_CREATE_TOPICS_ENABLE is false in compose, so producers (e.g.
        # core-api's OutboxShipperJob) need topics pre-created or they hang
        # waiting for delivery acks.
        run: |
          for topic in incidents.v1 corrective_actions.v1 users.v1 system.v1; do
            docker compose exec -T kafka kafka-topics.sh \
              --bootstrap-server localhost:9092 \
              --create --if-not-exists \
              --topic "$topic" --partitions 3 --replication-factor 1
          done

      - name: Register Avro schemas with live Karapace
        run: |
          for schema in schemas/events/v1/*.avsc; do
            subject="$(basename "$schema" .avsc)-value"
            payload=$(jq -Rs --arg t AVRO '{schema: ., schemaType: $t}' < "$schema")
            curl -fsS -X POST -H "Content-Type: application/vnd.schemaregistry.v1+json" \
              -d "$payload" \
              "http://localhost:8081/subjects/$subject/versions" >/dev/null
            echo "  registered: $subject"
          done

      - name: Migrate core-api database
        run: docker compose run --rm --no-deps core-api ./bin/rails db:prepare

      - name: Seed demo data (creates worker/investigator/admin accounts used by Playwright)
        run: docker compose run --rm --no-deps core-api ./bin/rails db:seed:demo

      - name: Migrate notifier database
        run: docker compose run --rm --no-deps notifier bundle exec rake db:create db:migrate

      - name: Bring up stack
        # Exclude minio-init: it's a one-shot run-to-completion container, and
        # `--wait` treats exit(0) as failure. minio-init is already done above.
        run: |
          services=$(docker compose config --services | grep -vx 'minio-init')
          docker compose up -d --wait $services
        timeout-minutes: 8

      - uses: pnpm/action-setup@v6
        with:
          version: "9"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install pnpm deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # Browser binaries live in ~/.cache/ms-playwright. Keyed on
      # pnpm-lock.yaml so a Playwright version bump invalidates the cache.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (browsers cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: pnpm exec playwright install-deps chromium

      - name: Run e2e
        working-directory: frontend
        run: pnpm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 14

      - name: Capture compose logs on failure
        if: failure()
        run: docker compose logs --tail=500
