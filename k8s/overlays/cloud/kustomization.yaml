apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  # Kafka credential Secrets (placeholder values — real values injected by ops
  # via External Secrets Operator, Sealed Secrets, or kubectl create secret).
  - kafka-credentials.secret.yaml
  # One-shot job: creates SCRAM users, topics, and ACLs on first deploy.
  - kafka-bootstrap.job.yaml

patches:
  - target: { kind: Ingress, name: ehs }
    patch: |
      - op: add
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-prod
      - op: replace
        path: /spec/rules/0/host
        value: app.ehs.example.com
      - op: add
        path: /spec/tls
        value:
          - hosts: [app.ehs.example.com]
            secretName: ehs-tls

  # Inject Kafka SASL_SSL credentials + CA volume into core-api and sidekiq.
  - path: kafka-patch-core-api.yaml
  - path: kafka-patch-sidekiq.yaml

  # Inject Kafka SASL_SSL credentials + CA volume into notifier deployments.
  - path: kafka-patch-notifier.yaml
  - path: kafka-patch-notifier-karafka.yaml

images:
  - name: ghcr.io/ehs-labs/ehs-core-api
    newTag: latest
  - name: ghcr.io/ehs-labs/ehs-notifier
    newTag: latest
  - name: ghcr.io/ehs-labs/ehs-frontend
    newTag: latest
