apiVersion: v1
kind: Secret
metadata:
  name: kafka-credentials
  namespace: ehs
type: Opaque
stringData:
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  KAFKA_SASL_MECHANISM: "SCRAM-SHA-512"
  # Replace with the actual service principal credentials at deploy time.
  # Never commit real values — inject via your CD pipeline or External Secrets Operator.
  KAFKA_SASL_USERNAME: "REPLACE_ME"
  KAFKA_SASL_PASSWORD: "REPLACE_ME"
  KAFKA_TLS_CA_FILE: "/etc/kafka/ssl/ca.crt"
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-ca-cert
  namespace: ehs
type: Opaque
stringData:
  # Base64-encode your broker CA certificate and paste here, or inject via ESO.
  # Example: kubectl create secret generic kafka-ca-cert --from-file=ca.crt=./ca.crt
  ca.crt: "REPLACE_ME_WITH_PEM_ENCODED_CA_CERT"
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-admin-credentials
  namespace: ehs
type: Opaque
stringData:
  # Bootstrap admin principal used only by the kafka-bootstrap Job.
  # Must be created ahead of time (e.g. via MSK IAM bootstrap or a manual
  # SCRAM entry created against the internal listener before TLS enforcement).
  KAFKA_ADMIN_USERNAME: "REPLACE_ME"
  KAFKA_ADMIN_PASSWORD: "REPLACE_ME"
  KAFKA_BROKERS: "REPLACE_ME_BROKER_HOST:9092"
