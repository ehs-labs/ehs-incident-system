# ============================================================================
# DEV-ONLY secrets for the local overlay. Never use these values in production.
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: ehs-secrets
  namespace: ehs
type: Opaque
stringData:
  POSTGRES_USER: ehs
  POSTGRES_PASSWORD: devpassword
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  JWT_SECRET: dev-jwt-secret-replace-in-production-dev-jwt-secret-replace-in-prod
  JWT_DENYLIST_SECRET: dev-jwt-denylist-secret-dev-jwt-denylist-secret-dev-jwt-deny-pad
  # Rails >= 7 requires SECRET_KEY_BASE in production (RAILS_ENV=production is
  # set in the ConfigMap to mirror the cloud overlay). Any 30+ char string works
  # for dev; rotate in real environments.
  SECRET_KEY_BASE: dev-secret-key-base-replace-in-production-dev-secret-key-base-replace
  # Base64 of 32 zero bytes — purely for dev
  FIELD_CIPHER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  TELEGRAM_BOT_TOKEN: ""
