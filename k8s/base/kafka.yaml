apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: ehs
spec:
  clusterIP: None
  selector: { app: kafka }
  ports: [{ port: 9092, targetPort: 9092 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: ehs
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      containers:
        - name: kafka
          # bitnamilegacy/kafka:3.8.x — `latest` jumps to Kafka 4.0 which dropped
          # older protocol versions Karapace 3.7.1's kafka-python client needs.
          image: bitnamilegacy/kafka:3.8.1
          env:
            - { name: KAFKA_CFG_NODE_ID, value: "0" }
            - { name: KAFKA_CFG_PROCESS_ROLES, value: "controller,broker" }
            - { name: KAFKA_CFG_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_CFG_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS, value: "0@kafka-0.kafka:9093" }
            - { name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE, value: "false" }
            - { name: ALLOW_PLAINTEXT_LISTENER, value: "yes" }
          ports: [{ containerPort: 9092 }]
          volumeMounts: [{ name: data, mountPath: /bitnami/kafka }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: karapace
  namespace: ehs
spec:
  selector: { app: karapace }
  ports: [{ port: 8081, targetPort: 8081 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karapace
  namespace: ehs
spec:
  replicas: 1
  selector: { matchLabels: { app: karapace } }
  template:
    metadata: { labels: { app: karapace } }
    spec:
      containers:
        - name: karapace
          image: ghcr.io/aiven/karapace:latest
          # Image has no default entrypoint — dispatch via start.sh.
          command: ["/opt/karapace/start.sh", "registry"]
          env:
            - { name: KARAPACE_REGISTRY_HOST, value: "0.0.0.0" }
            - { name: KARAPACE_REGISTRY_PORT, value: "8081" }
            - { name: KARAPACE_REGISTRY_BOOTSTRAP_URI, value: "kafka:9092" }
            - { name: KARAPACE_REGISTRY_CLIENT_ID, value: "karapace" }
            - { name: KARAPACE_REGISTRY_GROUP_ID, value: "schema-registry" }
            - { name: KARAPACE_REGISTRY_TOPIC_NAME, value: "_schemas" }
            - { name: KARAPACE_REGISTRY_COMPATIBILITY, value: "BACKWARD" }
            - { name: KARAPACE_REGISTRY_MASTER_ELIGIBILITY, value: "true" }
          ports: [{ containerPort: 8081 }]
          readinessProbe:
            httpGet: { path: /subjects, port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /_health, port: 8081 }
            initialDelaySeconds: 60
            periodSeconds: 30
---
# ============================================================================
# Kafka bootstrap — ensure topics exist.
#
# Kafka in this overlay has KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false (we want
# explicit topic management rather than implicit creation on first produce),
# so we have to create them ourselves. Mirrors the loop in scripts/bootstrap.sh
# for the docker-compose path. The Job's command is idempotent
# (--if-not-exists), so a repeated `kubectl apply` reuses the existing Job;
# recreate it by deleting first if you need to force a re-run.
# ============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-bootstrap
  namespace: ehs
spec:
  # The bootstrap script does its own polling, so a single attempt is normally
  # enough; allow a couple of retries in case the Kafka StatefulSet hasn't
  # opened port 9092 yet.
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      # The Kafka NetworkPolicy whitelists ingress only from a few app labels;
      # without this the bootstrap pod's TCP to kafka:9092 times out on CNIs
      # that enforce NetworkPolicy (Docker Desktop newer versions do).
      labels: { app: kafka-bootstrap }
    spec:
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: bitnamilegacy/kafka:3.8.1
          command:
            - sh
            - -c
            - |
              set -e
              until kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
                echo "waiting for kafka..."; sleep 3
              done
              for t in incidents.v1 corrective_actions.v1 users.v1 system.v1; do
                kafka-topics.sh --bootstrap-server kafka:9092 \
                  --create --if-not-exists \
                  --topic "$t" --partitions 3 --replication-factor 1
              done
              echo "topics ready"
