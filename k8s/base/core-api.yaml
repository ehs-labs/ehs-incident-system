apiVersion: v1
kind: Service
metadata:
  name: core-api
  namespace: ehs
spec:
  selector: { app: core-api }
  ports: [{ port: 3000, targetPort: 3000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: ehs
  labels: { app: core-api }
spec:
  replicas: 2
  selector: { matchLabels: { app: core-api } }
  template:
    metadata:
      labels: { app: core-api }
    spec:
      containers:
        - name: core-api
          image: ghcr.io/stitch80/ehs-core-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: ehs-config }
          env:
            - { name: POSTGRES_USER,        valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_USER } } }
            - { name: POSTGRES_PASSWORD,    valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_PASSWORD } } }
            - { name: S3_ACCESS_KEY_ID,     valueFrom: { secretKeyRef: { name: ehs-secrets, key: S3_ACCESS_KEY_ID } } }
            - { name: S3_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: ehs-secrets, key: S3_SECRET_ACCESS_KEY } } }
            - { name: JWT_SECRET,           valueFrom: { secretKeyRef: { name: ehs-secrets, key: JWT_SECRET } } }
            - { name: JWT_DENYLIST_SECRET,  valueFrom: { secretKeyRef: { name: ehs-secrets, key: JWT_DENYLIST_SECRET } } }
            - { name: FIELD_CIPHER_KEY,     valueFrom: { secretKeyRef: { name: ehs-secrets, key: FIELD_CIPHER_KEY } } }
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_APP_DB)"
          ports: [{ containerPort: 3000 }]
          readinessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sidekiq
  namespace: ehs
spec:
  replicas: 1
  selector: { matchLabels: { app: sidekiq } }
  template:
    metadata: { labels: { app: sidekiq } }
    spec:
      containers:
        - name: sidekiq
          image: ghcr.io/stitch80/ehs-core-api:latest
          command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
          envFrom:
            - configMapRef: { name: ehs-config }
          env:
            - { name: POSTGRES_USER,        valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_USER } } }
            - { name: POSTGRES_PASSWORD,    valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_PASSWORD } } }
            - { name: JWT_SECRET,           valueFrom: { secretKeyRef: { name: ehs-secrets, key: JWT_SECRET } } }
            - { name: FIELD_CIPHER_KEY,     valueFrom: { secretKeyRef: { name: ehs-secrets, key: FIELD_CIPHER_KEY } } }
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_APP_DB)"
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate-core-api
  namespace: ehs
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/stitch80/ehs-core-api:latest
          command: ["bin/rails", "db:create", "db:migrate"]
          envFrom: [{ configMapRef: { name: ehs-config } }]
          env:
            - { name: POSTGRES_USER,     valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_USER } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_PASSWORD } } }
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_APP_DB)"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: core-api
  namespace: ehs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: core-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: core-api
  namespace: ehs
spec:
  minAvailable: 1
  selector: { matchLabels: { app: core-api } }
