apiVersion: v1
kind: Service
metadata:
  name: core-api
  namespace: ehs
spec:
  selector: { app: core-api }
  ports: [{ port: 3000, targetPort: 3000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: ehs
  labels: { app: core-api }
spec:
  replicas: 2
  selector: { matchLabels: { app: core-api } }
  template:
    metadata:
      labels: { app: core-api }
    spec:
      # Wait for postgres to accept connections AND for db-migrate-core-api to
      # have populated schema_migrations. Without this the app would boot
      # before migrations finish, the check_migrations initializer would
      # abort, and the pod would CrashLoopBackOff its way to readiness.
      initContainers:
        - name: wait-for-app-db
          image: postgres:16-alpine
          envFrom:
            - configMapRef: { name: ehs-config }
            - secretRef:    { name: ehs-secrets }
          command:
            - sh
            - -c
            - |
              set -e
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_APP_DB" -q; do
                echo "waiting for postgres TCP..."; sleep 2
              done
              export PGPASSWORD="$POSTGRES_PASSWORD"
              until psql -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_APP_DB" -tAc \
                   "select count(*) > 0 from schema_migrations" 2>/dev/null | grep -q '^t'; do
                echo "waiting for migrations..."; sleep 2
              done
              echo "app db ready"
      containers:
        - name: core-api
          image: ghcr.io/ehs-labs/ehs-core-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: ehs-config }
            # All secret keys (POSTGRES_USER/PASSWORD, JWT_SECRET,
            # JWT_DENYLIST_SECRET, FIELD_CIPHER_KEY, SECRET_KEY_BASE,
            # S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY, ...) — injected as env.
            - secretRef:    { name: ehs-secrets }
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_APP_DB)"
          ports: [{ containerPort: 3000 }]
          readinessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sidekiq
  namespace: ehs
spec:
  replicas: 1
  selector: { matchLabels: { app: sidekiq } }
  template:
    metadata: { labels: { app: sidekiq } }
    spec:
      # Sidekiq's OutboxShipperJob produces to Kafka; both DB and Kafka topics
      # must exist before the worker starts ticking.
      initContainers:
        - name: wait-for-app-db
          image: postgres:16-alpine
          envFrom:
            - configMapRef: { name: ehs-config }
            - secretRef:    { name: ehs-secrets }
          command:
            - sh
            - -c
            - |
              set -e
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_APP_DB" -q; do
                echo "waiting for postgres TCP..."; sleep 2
              done
              export PGPASSWORD="$POSTGRES_PASSWORD"
              until psql -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_APP_DB" -tAc \
                   "select count(*) > 0 from schema_migrations" 2>/dev/null | grep -q '^t'; do
                echo "waiting for migrations..."; sleep 2
              done
              echo "app db ready"
        - name: wait-for-kafka-topics
          image: bitnamilegacy/kafka:3.8.1
          command:
            - sh
            - -c
            - |
              until kafka-topics.sh --bootstrap-server kafka:9092 --list 2>/dev/null | grep -q "^incidents.v1$"; do
                echo "waiting for kafka topics..."; sleep 2
              done
              echo "kafka topics ready"
      containers:
        - name: sidekiq
          image: ghcr.io/ehs-labs/ehs-core-api:latest
          command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
          envFrom:
            - configMapRef: { name: ehs-config }
            - secretRef:    { name: ehs-secrets }
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_APP_DB)"
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate-core-api
  namespace: ehs
spec:
  # 6 attempts (1 + 5 retries). The Job races postgres startup on a fresh
  # cluster; the wait-for-postgres init container covers the common case,
  # but a generous backoffLimit gives us a safety net.
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      # NetworkPolicy on postgres allows ingress from app=core-api; the
      # migration pod needs the same label to reach the DB on clusters whose
      # CNI enforces network policies.
      labels: { app: core-api }
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d postgres -q; do
                echo "waiting for postgres..."; sleep 2
              done
              echo "postgres is ready"
          env:
            - { name: POSTGRES_USER, valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_USER } } }
      containers:
        - name: migrate
          image: ghcr.io/ehs-labs/ehs-core-api:latest
          command: ["bin/rails", "db:create", "db:migrate"]
          envFrom:
            - configMapRef: { name: ehs-config }
            # Inject ALL secret keys so the Rails Devise/JWT/cipher initializers
            # find what they need at boot. Mirrors the runtime Deployment env.
            - secretRef:    { name: ehs-secrets }
          env:
            # The check_migrations initializer aborts boot when migrations are
            # pending; that's deliberate for web/sidekiq pods but would
            # deadlock this Job. Opt the migration container out.
            - { name: SKIP_MIGRATION_CHECK, value: "true" }
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_APP_DB)"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: core-api
  namespace: ehs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: core-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: core-api
  namespace: ehs
spec:
  minAvailable: 1
  selector: { matchLabels: { app: core-api } }
