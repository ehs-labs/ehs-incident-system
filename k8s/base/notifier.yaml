apiVersion: v1
kind: Service
metadata:
  name: notifier
  namespace: ehs
spec:
  selector: { app: notifier }
  ports: [{ port: 4000, targetPort: 4000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifier
  namespace: ehs
spec:
  replicas: 2
  selector: { matchLabels: { app: notifier } }
  template:
    metadata: { labels: { app: notifier } }
    spec:
      containers:
        - name: notifier
          image: ghcr.io/stitch80/ehs-notifier:latest
          envFrom: [{ configMapRef: { name: ehs-config } }]
          env:
            - { name: POSTGRES_USER,     valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_USER } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_PASSWORD } } }
            - { name: JWT_SECRET,        valueFrom: { secretKeyRef: { name: ehs-secrets, key: JWT_SECRET } } }
            - { name: FIELD_CIPHER_KEY,  valueFrom: { secretKeyRef: { name: ehs-secrets, key: FIELD_CIPHER_KEY } } }
            - { name: TELEGRAM_BOT_TOKEN,valueFrom: { secretKeyRef: { name: ehs-secrets, key: TELEGRAM_BOT_TOKEN } } }
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_NOTIFIER_DB)"
          ports: [{ containerPort: 4000 }]
          readinessProbe:
            httpGet: { path: /healthz, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifier-karafka
  namespace: ehs
spec:
  replicas: 1
  selector: { matchLabels: { app: notifier-karafka } }
  template:
    metadata: { labels: { app: notifier-karafka } }
    spec:
      containers:
        - name: karafka
          image: ghcr.io/stitch80/ehs-notifier:latest
          command: ["bundle", "exec", "karafka", "server"]
          envFrom: [{ configMapRef: { name: ehs-config } }]
          env:
            - { name: POSTGRES_USER,     valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_USER } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_PASSWORD } } }
            - { name: FIELD_CIPHER_KEY,  valueFrom: { secretKeyRef: { name: ehs-secrets, key: FIELD_CIPHER_KEY } } }
            - { name: TELEGRAM_BOT_TOKEN,valueFrom: { secretKeyRef: { name: ehs-secrets, key: TELEGRAM_BOT_TOKEN } } }
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_NOTIFIER_DB)"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate-notifier
  namespace: ehs
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/stitch80/ehs-notifier:latest
          command: ["bundle", "exec", "rake", "db:create", "db:migrate"]
          envFrom: [{ configMapRef: { name: ehs-config } }]
          env:
            - { name: POSTGRES_USER,     valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_USER } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_PASSWORD } } }
            - name: SKIP_MIGRATION_CHECK
              value: "true"
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_NOTIFIER_DB)"
