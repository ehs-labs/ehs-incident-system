apiVersion: v1
kind: Service
metadata:
  name: notifier
  namespace: ehs
spec:
  selector: { app: notifier }
  ports: [{ port: 4000, targetPort: 4000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifier
  namespace: ehs
spec:
  replicas: 2
  selector: { matchLabels: { app: notifier } }
  template:
    metadata: { labels: { app: notifier } }
    spec:
      # Notifier uses Sequel, which writes its migration version to
      # `schema_info` (not Rails' schema_migrations). Wait until that row
      # exists before starting the Falcon process, otherwise boot.rb's
      # migration-pending tripwire aborts and we crash-loop.
      initContainers:
        - name: wait-for-notifier-db
          image: postgres:16-alpine
          envFrom:
            - configMapRef: { name: ehs-config }
            - secretRef:    { name: ehs-secrets }
          command:
            - sh
            - -c
            - |
              set -e
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_NOTIFIER_DB" -q; do
                echo "waiting for postgres TCP..."; sleep 2
              done
              export PGPASSWORD="$POSTGRES_PASSWORD"
              until psql -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_NOTIFIER_DB" -tAc \
                   "select count(*) > 0 from schema_info" 2>/dev/null | grep -q '^t'; do
                echo "waiting for migrations..."; sleep 2
              done
              echo "notifier db ready"
      containers:
        - name: notifier
          image: ghcr.io/ehs-labs/ehs-notifier:latest
          envFrom:
            - configMapRef: { name: ehs-config }
            - secretRef:    { name: ehs-secrets }
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_NOTIFIER_DB)"
          ports: [{ containerPort: 4000 }]
          readinessProbe:
            httpGet: { path: /healthz, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifier-karafka
  namespace: ehs
spec:
  replicas: 1
  selector: { matchLabels: { app: notifier-karafka } }
  template:
    metadata: { labels: { app: notifier-karafka } }
    spec:
      # Karafka starts subscribing immediately; if the topics aren't there
      # yet it bumps its consumer-group offsets to the current high-watermark
      # and then misses anything published later in the same instant. Wait
      # for both the notifier DB AND the four Kafka topics before launching.
      initContainers:
        - name: wait-for-notifier-db
          image: postgres:16-alpine
          envFrom:
            - configMapRef: { name: ehs-config }
            - secretRef:    { name: ehs-secrets }
          command:
            - sh
            - -c
            - |
              set -e
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_NOTIFIER_DB" -q; do
                echo "waiting for postgres TCP..."; sleep 2
              done
              export PGPASSWORD="$POSTGRES_PASSWORD"
              until psql -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_NOTIFIER_DB" -tAc \
                   "select count(*) > 0 from schema_info" 2>/dev/null | grep -q '^t'; do
                echo "waiting for migrations..."; sleep 2
              done
              echo "notifier db ready"
        - name: wait-for-kafka-topics
          image: bitnamilegacy/kafka:3.8.1
          command:
            - sh
            - -c
            - |
              until kafka-topics.sh --bootstrap-server kafka:9092 --list 2>/dev/null | grep -q "^incidents.v1$"; do
                echo "waiting for kafka topics..."; sleep 2
              done
              echo "kafka topics ready"
      containers:
        - name: karafka
          image: ghcr.io/ehs-labs/ehs-notifier:latest
          command: ["bundle", "exec", "karafka", "server"]
          envFrom:
            - configMapRef: { name: ehs-config }
            - secretRef:    { name: ehs-secrets }
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_NOTIFIER_DB)"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate-notifier
  namespace: ehs
spec:
  # 6 attempts (1 + 5 retries). See db-migrate-core-api for rationale.
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      # NetworkPolicy on postgres allows ingress from app=notifier.
      labels: { app: notifier }
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d postgres -q; do
                echo "waiting for postgres..."; sleep 2
              done
              echo "postgres is ready"
          env:
            - { name: POSTGRES_USER, valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_USER } } }
      containers:
        - name: migrate
          image: ghcr.io/ehs-labs/ehs-notifier:latest
          command: ["bundle", "exec", "rake", "db:create", "db:migrate"]
          envFrom:
            - configMapRef: { name: ehs-config }
            # Inject all secrets (FIELD_CIPHER_KEY, etc) so config/boot.rb's
            # FIELD_CIPHER initialization succeeds. Mirrors the runtime Deployment.
            - secretRef:    { name: ehs-secrets }
          env:
            - name: SKIP_MIGRATION_CHECK
              value: "true"
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_NOTIFIER_DB)"
