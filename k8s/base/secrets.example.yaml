# ============================================================================
# SAMPLE Secrets manifest — DO NOT COMMIT REAL VALUES.
#
# Generate real values:
#   openssl rand -base64 32          # FIELD_CIPHER_KEY (32 raw bytes → 44 b64 chars)
#   ruby -rsecurerandom -e 'puts SecureRandom.hex(64)'   # JWT_SECRET / SECRET_KEY_BASE
#
# In production, prefer a secrets operator (External Secrets Operator with
# AWS Secrets Manager / GCP Secret Manager / HashiCorp Vault) over committed
# manifests.
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: ehs-secrets
  namespace: ehs
type: Opaque
stringData:
  POSTGRES_USER: ehs
  POSTGRES_PASSWORD: change-me-strong-password
  S3_ACCESS_KEY_ID: change-me
  S3_SECRET_ACCESS_KEY: change-me-strong-secret
  JWT_SECRET: replace-with-64-hex-chars
  JWT_DENYLIST_SECRET: replace-with-64-hex-chars
  SECRET_KEY_BASE: replace-with-64-hex-chars
  FIELD_CIPHER_KEY: replace-with-base64-32-byte-key
  TELEGRAM_BOT_TOKEN: ""
  KAFKA_SASL_USERNAME: ehs-api
  KAFKA_SASL_PASSWORD: change-me
