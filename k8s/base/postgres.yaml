apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ehs
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ehs
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER,     valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_USER } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: ehs-secrets, key: POSTGRES_PASSWORD } } }
            - { name: POSTGRES_DB,       valueFrom: { configMapKeyRef: { name: ehs-config, key: POSTGRES_APP_DB } } }
            - name: POSTGRES_MULTIPLE_DATABASES
              value: "ehs_app,ehs_notifier"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports: [{ containerPort: 5432 }]
          volumeMounts:
            - { name: data,        mountPath: /var/lib/postgresql/data }
            - { name: init-script, mountPath: /docker-entrypoint-initdb.d/postgres-init.sh, subPath: postgres-init.sh }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "ehs"] }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-script
          configMap:
            name: postgres-init
            defaultMode: 0o755
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: ehs
data:
  postgres-init.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    if [[ -z "${POSTGRES_MULTIPLE_DATABASES:-}" ]]; then exit 0; fi
    IFS=',' read -ra DBS <<< "$POSTGRES_MULTIPLE_DATABASES"
    for db in "${DBS[@]}"; do
      db_trimmed="$(echo "$db" | xargs)"
      [[ "$db_trimmed" == "$POSTGRES_DB" ]] && continue
      psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" <<-SQL
        SELECT 'CREATE DATABASE $db_trimmed'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '$db_trimmed')\gexec
    SQL
    done
