apiVersion: v1
kind: ConfigMap
metadata:
  name: ehs-config
  namespace: ehs
data:
  # ---- Service discovery (in-cluster DNS) ------------------------------------
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_APP_DB: ehs_app
  POSTGRES_NOTIFIER_DB: ehs_notifier
  REDIS_URL: redis://redis:6379/0
  KAFKA_BROKERS: kafka:9092
  KARAPACE_URL: http://karapace:8081
  S3_ENDPOINT: http://minio:9000
  S3_REGION: us-east-1
  S3_BUCKET: ehs-attachments
  SMTP_HOST: mailcatcher
  SMTP_PORT: "1025"
  SMTP_FROM: no-reply@ehs.local

  # ---- App config ------------------------------------------------------------
  APP_HOST: http://app.ehs.test
  NOTIFIER_WS_URL: ws://app.ehs.test/ws
  SIGNUP_ENABLED: "true"
  STRICT_MIGRATION_CHECK: "true"
  RAILS_ENV: production
  RACK_ENV: production
  RAILS_LOG_TO_STDOUT: "1"
