apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: ehs
spec:
  selector: { app: minio }
  ports:
    - { name: api,     port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: ehs
spec:
  serviceName: minio
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - { name: MINIO_ROOT_USER,     valueFrom: { secretKeyRef: { name: ehs-secrets, key: S3_ACCESS_KEY_ID } } }
            - { name: MINIO_ROOT_PASSWORD, valueFrom: { secretKeyRef: { name: ehs-secrets, key: S3_SECRET_ACCESS_KEY } } }
          ports:
            - { containerPort: 9000 }
            - { containerPort: 9001 }
          volumeMounts: [{ name: data, mountPath: /data }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: ehs
spec:
  # 6 attempts (1 + 5 retries) — MinIO can take a few seconds to accept S3
  # API requests after the pod reports Ready, especially on a cold cluster.
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              set -e
              until mc alias set local "http://minio:9000" "$S3_ACCESS_KEY_ID" "$S3_SECRET_ACCESS_KEY"; do
                echo "waiting for minio..."; sleep 2
              done
              mc mb -p "local/$S3_BUCKET" || true
              mc anonymous set download "local/$S3_BUCKET"
          envFrom:
            - configMapRef: { name: ehs-config }
            - secretRef:    { name: ehs-secrets }
