# ============================================================================
# Least-privilege NetworkPolicies.
# Requires a CNI that supports NetworkPolicy (Calico, Cilium, etc.).
# Docker Desktop's default CNI does NOT enforce these — they're a portfolio
# signal here; the cloud overlay uses a real CNI.
# ============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-from-app
  namespace: ehs
spec:
  podSelector: { matchLabels: { app: postgres } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: core-api } }
        - podSelector: { matchLabels: { app: sidekiq } }
        - podSelector: { matchLabels: { app: notifier } }
        - podSelector: { matchLabels: { app: notifier-karafka } }
      ports: [{ protocol: TCP, port: 5432 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-allow-from-app
  namespace: ehs
spec:
  podSelector: { matchLabels: { app: kafka } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: core-api } }
        - podSelector: { matchLabels: { app: sidekiq } }
        - podSelector: { matchLabels: { app: notifier-karafka } }
        - podSelector: { matchLabels: { app: karapace } }
      ports: [{ protocol: TCP, port: 9092 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: karapace-allow-from-app
  namespace: ehs
spec:
  podSelector: { matchLabels: { app: karapace } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: core-api } }
        - podSelector: { matchLabels: { app: sidekiq } }
        - podSelector: { matchLabels: { app: notifier } }
        - podSelector: { matchLabels: { app: notifier-karafka } }
      ports: [{ protocol: TCP, port: 8081 }]
