# ============================================================================
# Least-privilege NetworkPolicies.
# Requires a CNI that supports NetworkPolicy (Calico, Cilium, etc.). Older
# Docker Desktop CNI versions were no-ops; recent ones DO enforce these, so
# every pod that needs to reach postgres/kafka/karapace must carry one of the
# allow-listed app labels below. Affects bootstrap Jobs too.
# ============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-from-app
  namespace: ehs
spec:
  podSelector: { matchLabels: { app: postgres } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: core-api } }
        - podSelector: { matchLabels: { app: sidekiq } }
        - podSelector: { matchLabels: { app: notifier } }
        - podSelector: { matchLabels: { app: notifier-karafka } }
      ports: [{ protocol: TCP, port: 5432 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-allow-from-app
  namespace: ehs
spec:
  podSelector: { matchLabels: { app: kafka } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: core-api } }
        - podSelector: { matchLabels: { app: sidekiq } }
        - podSelector: { matchLabels: { app: notifier-karafka } }
        - podSelector: { matchLabels: { app: karapace } }
        # The one-shot bootstrap Job creates topics on bring-up.
        - podSelector: { matchLabels: { app: kafka-bootstrap } }
      ports: [{ protocol: TCP, port: 9092 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: karapace-allow-from-app
  namespace: ehs
spec:
  podSelector: { matchLabels: { app: karapace } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: core-api } }
        - podSelector: { matchLabels: { app: sidekiq } }
        - podSelector: { matchLabels: { app: notifier } }
        - podSelector: { matchLabels: { app: notifier-karafka } }
      ports: [{ protocol: TCP, port: 8081 }]
