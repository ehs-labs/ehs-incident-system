# ============================================================================
# Development overrides — auto-merged with docker-compose.yml because Docker
# Compose v2 loads docker-compose.override.yml automatically.
#
# Adds source-code bind mounts so edits on the host take effect without an
# image rebuild. The bundle gems stay in the image's /usr/local/bundle (NOT
# bind-mounted) so we keep the gems that were installed at build time. If you
# add a gem to a Gemfile, rebuild the affected image.
# ============================================================================

services:
  core-api:
    command: bin/rails server -b 0.0.0.0 -p 3000
    volumes:
      - ./core-api:/app
      - ./shared/envelope:/shared/envelope

  sidekiq:
    volumes:
      - ./core-api:/app
      - ./shared/envelope:/shared/envelope

  notifier:
    command: bundle exec falcon serve --bind http://0.0.0.0:4000
    volumes:
      - ./notifier:/app
      - ./shared/envelope:/shared/envelope

  notifier-karafka:
    volumes:
      - ./notifier:/app
      - ./shared/envelope:/shared/envelope
      - ./schemas/events/v1:/schemas/events/v1

  frontend:
    command: pnpm run dev --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  frontend-node-modules:
